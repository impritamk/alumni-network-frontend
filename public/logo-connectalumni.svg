<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f0f4ff" stroke="#2563eb" stroke-width="2"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Center circle (main node) -->
  <circle cx="100" cy="100" r="25" fill="url(#logoGradient)" stroke="white" stroke-width="3"/>
  
  <!-- Top left connection -->
  <circle cx="60" cy="50" r="15" fill="#2563eb" stroke="white" stroke-width="2"/>
  <line x1="75" y1="70" x2="85" y2="90" stroke="url(#logoGradient)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Top right connection -->
  <circle cx="140" cy="50" r="15" fill="#7c3aed" stroke="white" stroke-width="2"/>
  <line x1="125" y1="70" x2="115" y2="90" stroke="url(#logoGradient)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Bottom left connection -->
  <circle cx="50" cy="140" r="15" fill="#7c3aed" stroke="white" stroke-width="2"/>
  <line x1="65" y1="125" x2="85" y2="110" stroke="url(#logoGradient)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Bottom right connection -->
  <circle cx="150" cy="140" r="15" fill="#2563eb" stroke="white" stroke-width="2"/>
  <line x1="135" y1="125" x2="115" y2="110" stroke="url(#logoGradient)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Center icon: graduation cap style -->
  <g transform="translate(100, 100)">
    <!-- Cap top -->
    <rect x="-12" y="-8" width="24" height="4" fill="white" rx="2"/>
    <!-- Cap visor -->
    <ellipse cx="0" cy="-5" rx="14" ry="6" fill="white" opacity="0.9"/>
    <!-- Tassel -->
    <line x1="0" y1="-4" x2="0" y2="8" stroke="white" stroke-width="1.5"/>
    <circle cx="0" cy="10" r="2" fill="white"/>
  </g>
  
  <!-- Small accent dots -->
  <circle cx="40" cy="100" r="3" fill="#2563eb" opacity="0.5"/>
  <circle cx="160" cy="100" r="3" fill="#7c3aed" opacity="0.5"/>
  <circle cx="100" cy="35" r="3" fill="#2563eb" opacity="0.5"/>
  <circle cx="100" cy="165" r="3" fill="#7c3aed" opacity="0.5"/>
</svg>
